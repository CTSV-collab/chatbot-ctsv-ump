<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot CTSV - UMP</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  
<div class="app">

  <!-- HEADER -->
  <div class="chat-header">
    <img src="logo.png" class="logo">
    <div>
      <div class="title">Chatbot Phòng CTSV - UMP</div>
      <div class="subtitle">Hỗ trợ thông tin sinh viên</div>
    </div>
  </div>

  <!-- BODY: CHỈ CHỨA TIN NHẮN -->
  <div class="chat-body" id="chatMessages">
    <div class="message bot">
      👋 Xin chào! Tôi là Chatbot Phòng CTSV – Đại học Y Dược TPHCM.  
      Bạn cần hỗ trợ nội dung gì?
    </div>
  </div>

  <!-- FOOTER: DÍNH DƯỚI -->
  <div class="chat-footer">

    <div class="quick-replies" id="quickReplies">
      <button onclick="sendQuick('Học bổng')">🎓 Học bổng</button>
      <button onclick="sendQuick('Giấy xác nhận')">📝 Giấy xác nhận</button>
      <button onclick="sendQuick('BHYT')">🩺 BHYT</button>
      <button onclick="sendQuick('Ký túc xá')">🏠 KTX</button>
      <button onclick="sendQuick('Vay vốn')">💰 Vay vốn</button>
      <button onclick="sendQuick('Liên hệ CTSV')">☎️ CTSV</button>
    </div>

    <div class="quick-toggle" onclick="toggleQuickReplies()">
  Thu gọn ▲
</div>

    <div class="chat-input">
      <input id="userInput" placeholder="Aa"
        onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>

<script>
function toggleQuickReplies() {
  const qr = document.getElementById("quickReplies");
  const toggle = document.querySelector(".quick-toggle");

  qr.classList.toggle("hidden");

  toggle.innerText = qr.classList.contains("hidden")
    ? "Mở gợi ý ▼"
    : "Thu gọn ▲";
}
</script>
